server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static single-page app (no client-side routing); fall back to index.html.
    location / {
        try_files $uri /index.html;
    }

    # Hashed build assets (including the bundled scrcpy server.bin) are immutable.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
